<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UserLooperGen — Hoş Geldin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#e2d9f3;font-family:'Syne',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}
.box{background:#12121a;border:1px solid #2a2040;border-radius:24px;padding:32px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;position:relative;z-index:1;}
.logo{width:80px;height:80px;border-radius:18px;object-fit:cover;box-shadow:0 8px 32px rgba(124,58,237,.4);}
h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#fff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
p{font-size:13px;color:#7c6fa0;line-height:1.6;}
.links{width:100%;display:flex;flex-direction:column;gap:8px;}
.links a{display:block;padding:12px 16px;background:#1a1a28;border:1px solid #2a2040;border-radius:12px;color:#c084fc;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s;}
.links a:active{background:rgba(124,58,237,.15);border-color:#7c3aed;}
.note{font-size:12px;color:#7c6fa0;line-height:1.6;}
.note strong{color:#a855f7;}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;}
.btn:active{opacity:.85;}
.ver{font-size:11px;color:#7c6fa0;font-family:'Space Mono',monospace;}
</style>
</head>
<body>

<div class="box">
  <img src="logo.jpeg" class="logo" alt="UserLooperGen">
  <h1>UserLooperGen'e<br>Hoş Geldin</h1>
  <p>Devam etmeden önce lütfen politikalarımızı incele.</p>

  <div class="links">
    <a href="terms.html" target="_blank">📄 Kullanım Şartları</a>
    <a href="privacy.html" target="_blank">🔒 Gizlilik Politikası</a>
    <a href="cookie.html" target="_blank">🍪 Çerez Politikası</a>
  </div>

  <p class="note">Butona basarak tüm politikaları <strong>okuduğunu ve kabul ettiğini</strong> onaylıyorsun.</p>

  <button class="btn" id="acceptBtn">Kabul Et ve Devam Et</button>
  <div class="ver">v0.1.0 • EnderArcane Studio</div>
</div>

<script>
document.getElementById('acceptBtn').addEventListener('click', function() {
  localStorage.setItem('ulgen_consent', '1');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
