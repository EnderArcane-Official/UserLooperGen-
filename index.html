<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UserLooperGen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
// ── CONSENT ────────────────────────────────────────────────────
(function() {
  var overlay = document.getElementById('consentOverlay');
  if (!overlay) return;
  if (localStorage.getItem('ulgen_consent')) {
    overlay.style.display = 'none';
    return;
  }
  document.getElementById('consentBtn').addEventListener('click', function() {
    localStorage.setItem('ulgen_consent', '1');
    overlay.style.display = 'none';
  });
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;--text:#e2d9f3;--muted:#7c6fa0;--border:#2a2040;--danger:#ef4444;--success:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ── CONSENT POPUP ───────────────────────────────────────────── */
#consentOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px);}
#consentBox{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;}
#consentBox img{width:72px;height:72px;border-radius:16px;object-fit:cover;}
#consentBox h2{font-size:20px;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#consentBox p{font-size:13px;color:var(--muted);line-height:1.55;}
.consent-checks{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left;}
.consent-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.consent-check input{width:20px;height:20px;accent-color:var(--accent2);cursor:pointer;flex-shrink:0;margin-top:1px;}
.consent-check label{font-size:13px;color:var(--muted);line-height:1.5;cursor:pointer;}
.consent-check a{color:var(--accent3);text-decoration:underline;cursor:pointer;}
.consent-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity .2s,transform .2s;}
.consent-btn:disabled{opacity:.3;cursor:not-allowed;}
.consent-btn:not(:disabled):active{transform:scale(.97);}
.consent-links{width:100%;display:flex;flex-direction:column;gap:8px;}
.consent-links a{display:block;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--accent3);font-size:14px;font-weight:600;text-decoration:none;text-align:center;transition:all .2s;}
.consent-links a:hover{border-color:var(--accent);background:rgba(124,58,237,.1);}
.consent-ver{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}

/* ── BURGER MENU ─────────────────────────────────────────────── */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.menu-overlay.open{opacity:1;pointer-events:all;}
.side-menu{position:fixed;top:0;left:0;width:280px;height:100%;background:var(--surface);border-right:1px solid var(--border);z-index:101;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.side-menu.open{transform:translateX(0);}
.side-menu-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--surface2),var(--surface));}
.side-menu-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.side-menu-sub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:4px;}
.side-menu-items{flex:1;padding:16px 0;overflow-y:auto;}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 24px;cursor:pointer;transition:background .2s,color .2s;font-size:15px;font-weight:600;color:var(--muted);border-left:3px solid transparent;}
.menu-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--accent);}
.menu-icon{font-size:18px;width:24px;text-align:center;}
.menu-divider{height:1px;background:var(--border);margin:8px 24px;}
.menu-section-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);padding:8px 24px 4px;text-transform:uppercase;letter-spacing:1px;}

/* ── TOPBAR ──────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:relative;z-index:10;flex-shrink:0;}
.burger-btn{width:36px;height:36px;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:4px;}
.burger-btn span{display:block;height:2px;background:var(--muted);border-radius:2px;}
.burger-btn:hover span{background:var(--accent2);}
.topbar-title{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#recBadge{display:none;align-items:center;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;color:var(--danger);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:4px 10px;border-radius:20px;animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* ── SECTIONS ────────────────────────────────────────────────── */
.main{flex:1;overflow:hidden;position:relative;z-index:1;}
.section{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity .3s,transform .3s;overflow-y:auto;}
.section.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* ── HOME ────────────────────────────────────────────────────── */
.home-section{align-items:center;justify-content:center;padding:40px 28px;text-align:center;gap:24px;}
.home-logo-wrap{position:relative;}
.home-logo-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:radial-gradient(circle,rgba(124,58,237,.4),transparent 70%);border-radius:50%;animation:glowPulse 3s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}
.home-logo{width:90px;height:90px;border-radius:20px;position:relative;z-index:1;animation:floatAnim 4s ease-in-out infinite;object-fit:cover;}
@keyframes floatAnim{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-title{font-size:34px;font-weight:800;line-height:1.1;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.home-sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px;}
.home-cta{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:14px 28px;border-radius:50px;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;box-shadow:0 8px 32px rgba(124,58,237,.4);transition:transform .2s;}
.home-cta:active{transform:scale(.96);}
.home-stats{display:flex;gap:24px;}
.stat{text-align:center;}
.stat-num{font-size:24px;font-weight:800;color:var(--accent2);font-family:'Space Mono',monospace;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* ── PAD ─────────────────────────────────────────────────────── */
.pad-section{padding:14px;gap:10px;}
.pad-header{display:flex;align-items:center;justify-content:space-between;}
.pad-title{font-size:12px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.timer-display{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--accent2);background:var(--surface2);padding:5px 13px;border-radius:20px;border:1px solid var(--border);}
.timer-display.running{color:var(--danger);border-color:var(--danger);}

/* PAD GRID */
.pad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pad{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;gap:3px;user-select:none;}
.pad::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,.15),transparent);opacity:0;transition:opacity .2s;}
.pad.loaded::before{opacity:1;}
.pad.loaded{border-color:rgba(124,58,237,.4);}
.pad.playing{background:var(--accent);border-color:var(--accent2);box-shadow:0 0 20px rgba(124,58,237,.5);animation:padPulse .8s ease-in-out infinite alternate;}
@keyframes padPulse{from{box-shadow:0 0 20px rgba(124,58,237,.5);}to{box-shadow:0 0 32px rgba(168,85,247,.9);}}
.pad-number{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);position:absolute;top:6px;left:8px;}
.pad.playing .pad-number{color:rgba(255,255,255,.6);}
.pad-icon{font-size:18px;z-index:1;transition:transform .15s;}
.pad:active .pad-icon{transform:scale(.82);}
.pad-name{font-size:9px;color:var(--muted);text-align:center;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;z-index:1;}
.pad.playing .pad-name{color:rgba(255,255,255,.8);}
.pad-hint{font-size:8px;color:var(--muted);opacity:.4;z-index:1;}

/* KAYIT KONTROLLERI */
.rec-row{display:flex;gap:8px;align-items:center;}
.rec-btn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;}
.rec-btn:disabled{opacity:.3;cursor:not-allowed;}
.rec-btn.start:not(:disabled):hover{border-color:var(--danger);color:var(--danger);}
.rec-btn.stop:not(:disabled):hover{border-color:var(--success);color:var(--success);}
.rec-btn.save-rec:not(:disabled){border-color:rgba(124,58,237,.4);color:var(--accent3);}
.rec-timer{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--muted);background:var(--surface2);padding:10px 10px;border-radius:10px;border:1px solid var(--border);min-width:56px;text-align:center;}

/* PAD KONTROLLER */
.pad-controls{display:flex;gap:8px;}
.ctrl-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent2);}
.ctrl-btn.danger:hover{background:rgba(239,68,68,.1);color:var(--danger);border-color:var(--danger);}
.ctrl-btn.file-btn{border-color:rgba(124,58,237,.4);}
.ctrl-btn.file-btn:hover{background:rgba(124,58,237,.1);color:var(--accent3);}

/* ── PROFILE ─────────────────────────────────────────────────── */
.profile-section{padding:20px;gap:16px;}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(124,58,237,.4);}
.profile-name{font-size:20px;font-weight:800;}
.profile-handle{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;}
.settings-group{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;width:100%;}
.settings-group-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 18px 8px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-top:1px solid var(--border);cursor:pointer;transition:background .2s;}
.setting-row:hover{background:var(--surface2);}
.setting-label{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;}
.setting-icon{font-size:18px;}
.setting-arrow{color:var(--muted);font-size:16px;}
.toggle{width:42px;height:24px;background:var(--border);border-radius:12px;position:relative;transition:background .2s;cursor:pointer;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}

/* ── MODALS ──────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-height:80dvh;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0;}
.modal-header{padding:16px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--muted);}
.modal-close:hover{background:var(--border);color:var(--text);}
.modal-body{padding:20px 24px 32px;overflow-y:auto;line-height:1.7;color:var(--muted);font-size:14px;}
.modal-body h3{color:var(--text);font-size:15px;margin:20px 0 8px;}
.modal-body p{margin-bottom:12px;}

/* ── DOSYALA MODAL ───────────────────────────────────────────── */
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
.bottom-sheet-overlay.open{opacity:1;pointer-events:all;}
.bottom-sheet{background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;padding:0 0 32px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);}
.bottom-sheet-overlay.open .bottom-sheet{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 12px;}
.sheet-title{font-size:18px;font-weight:800;padding:0 24px 16px;border-bottom:1px solid var(--border);}
.sheet-option{display:flex;align-items:center;gap:16px;padding:16px 24px;cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border);}
.sheet-option:last-child{border-bottom:none;}
.sheet-option:hover{background:var(--surface2);}
.sheet-option:active{background:var(--surface2);}
.sheet-option-icon{font-size:26px;}
.sheet-option-title{font-size:15px;font-weight:700;}
.sheet-option-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── UPLOAD MODAL ────────────────────────────────────────────── */
.center-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);padding:24px;}
.center-overlay.open{opacity:1;pointer-events:all;}
.center-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:320px;transform:scale(.9);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;gap:16px;}
.center-overlay.open .center-box{transform:scale(1);}
.center-box h3{font-size:18px;font-weight:800;}
.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.upload-zone:hover{border-color:var(--accent);background:rgba(124,58,237,.05);}
.upload-zone-icon{font-size:32px;}
.upload-zone-text{font-size:13px;color:var(--muted);}
.box-btns{display:flex;gap:10px;}
.box-cancel{flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.file-input{display:none;}

/* ── BOTTOM NAV ──────────────────────────────────────────────── */
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--surface);position:relative;z-index:10;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-btn{flex:1;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative;}
.nav-btn .nav-icon{font-size:22px;transition:transform .2s;}
.nav-btn .nav-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.nav-btn.active .nav-icon{transform:translateY(-2px);}
.nav-btn.active .nav-label{color:var(--accent2);}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:var(--accent2);border-radius:2px 2px 0 0;}
.nav-center-btn{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;box-shadow:0 4px 20px rgba(124,58,237,.5);margin-top:-10px;transition:transform .2s;}
.nav-btn:active .nav-center-btn{transform:scale(.93);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<!-- ── CONSENT POPUP ─────────────────────────────────────────────────────────── -->
<div id="consentOverlay">
  <div id="consentBox">
    <img src="logo.jpeg" alt="UserLooperGen">
    <h2>UserLooperGen'e Hoş Geldin</h2>
    <p>Devam etmek için lütfen politikaları kabul et.</p>
    <div class="consent-links">
      <a href="terms.html" target="_blank">📄 Kullanım Şartları</a>
      <a href="privacy.html" target="_blank">🔒 Gizlilik Politikası</a>
      <a href="cookie.html" target="_blank">🍪 Çerez Politikası</a>
    </div>
    <p style="font-size:12px;color:var(--muted);line-height:1.6;text-align:center;">"Kabul Et ve Devam Et" butonuna basarak tüm politikaları okuduğunu ve kabul ettiğini onaylıyorsun.</p>
    <button class="consent-btn" id="consentBtn">Kabul Et ve Devam Et</button>
    <div class="consent-ver">v0.1.0 • EnderArcane Studio</div>
  </div>
</div>

<!-- ── BURGER MENU ───────────────────────────────────────────────────────────── -->
<div class="menu-overlay" id="men
